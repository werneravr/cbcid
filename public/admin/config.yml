backend:
  name: github
  repo: werneravr/cbcid
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "communications"
    label: "Communications"
    folder: "src/content/communications"
    create: true
    slug: "{{year}}-{{month}}-{{fields.slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly identifier, e.g. december-2025-newsletter" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Newsletter", "Safety Update", "Community Notice", "Project Update", "Annual Report", "Survey"]
      - { label: "Summary", name: "summary", widget: "text" }
      - label: "Highlights"
        name: "highlights"
        widget: "list"
        field: { label: "Highlight", name: "highlight", widget: "string" }
        required: false
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "PDF Document", name: "pdfUrl", widget: "file", required: false, hint: "Upload the newsletter PDF" }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "documents"
    label: "Documents"
    folder: "src/content/documents"
    create: true
    slug: "{{fields.slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly identifier, e.g. business-plan-2024" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Business Plan & Budget"
          - "Annual Reports"
          - "Board & Governance"
          - "Legal & Regulatory"
          - "GiveSmart Campaign"
          - "Traffic Management"
          - "Other"
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "PDF File", name: "pdfUrl", widget: "file", hint: "Upload the PDF document" }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Sort Order", name: "order", widget: "number", default: 0, required: false }
