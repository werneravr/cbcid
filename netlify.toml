[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "22" }

[build.environment]
  NODE_VERSION = "22"

# Redirect /admin to /admin/ to ensure Decap CMS loads correctly
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Handle Netlify Identity redirect
[[redirects]]
  from = "/#"
  to = "/"
  status = 200
  force = false

# SPA fallback for any unmatched routes
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
